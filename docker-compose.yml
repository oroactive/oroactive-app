services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://oroactive_admin:oroactive_password@postgres:5432/oroactive_db
      NODE_ENV: production
      JWT_SECRET: cambia-questa-chiave-jwt-oroactive
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@oroactive.it
      ADMIN_PASSWORD: OroActive2026!
      ADMIN_NOME: Admin
      ADMIN_COGNOME: OroActive
      ADMIN_NEGOZIO: Busto Arsizio
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oroactive_admin
      POSTGRES_PASSWORD: oroactive_password
      POSTGRES_DB: oroactive_db
    volumes:
      - oroactive-postgres:/var/lib/postgresql/data

volumes:
  oroactive-postgres:
