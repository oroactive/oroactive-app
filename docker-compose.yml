services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://oroactive_admin:${POSTGRES_PASSWORD:-INSERISCI_PASSWORD_DATABASE}@postgres:5432/oroactive_db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-INSERISCI_CHIAVE_LUNGA_CASUALE}
      JWT_EXPIRES_IN: 7d
      ADMIN_USERNAME: Elite
      ADMIN_EMAIL: elite@oroactive.it
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-INSERISCI_PASSWORD_FOUNDER}
      ADMIN_NOME: Elite
      ADMIN_COGNOME: Founder
      ADMIN_NEGOZIO: Tutti
      BACKUP_DIR: /data/oroactive/backups
    volumes:
      - oroactive-backups:/data/oroactive/backups
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oroactive_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-INSERISCI_PASSWORD_DATABASE}
      POSTGRES_DB: oroactive_db
    volumes:
      - oroactive-postgres:/var/lib/postgresql/data

volumes:
  oroactive-postgres:
  oroactive-backups:
